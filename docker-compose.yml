version: "3.9"

services:
  mul-bench:
    image: mul-bench:latest
    container_name: mul-bench
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
      - ./data/reference:/data/reference
    working_dir: /data
    entrypoint: ["conda", "run", "--no-capture-output", "-n", "mul-bench"]
    command: ["mul-bench", "--help"]

  shell:
    image: mul-bench:latest
    container_name: mul-bench-shell
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
      - ./data/reference:/data/reference
    working_dir: /data
    stdin_open: true
    tty: true
    entrypoint: ["conda", "run", "--no-capture-output", "-n", "mul-bench", "/bin/bash"]

  demo:
    image: mul-bench:latest
    container_name: mul-bench-demo
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data/output:/data/output
    working_dir: /data
    entrypoint: ["conda", "run", "--no-capture-output", "-n", "mul-bench"]
    command: ["mul-bench", "demo", "-o", "/data/output/demo"]
